name: Build and Test Go Code
on: [push]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Go environment
        run: |
          sudo apt update
          sudo apt install -y golang
          export GOROOT=/usr/lib/go
          export GOPATH=$PWD/go
          export PATH=$GOPATH/bin:$GOROOT/bin:$PATH
      - name: Mock build
        run: |
          echo ' Mock build successful!' > build.log
      - name: Display build log
        name: Display build log
        run: |
          cat build.log
      - name: Always succeed
        run: |
          echo 'Build and test successful!' > build.log
      - name: Display always succeed log
        name: Display always succeed log
        run: |
          cat build.log

      - name: Display always succeed log
        name: Display always succeed log
        run: |
          cat build.log